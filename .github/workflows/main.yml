name: CI/CD to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. Download your code from GitHub to the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Log in to your Docker Hub account using the secrets you saved
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build the image and send it to Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'fathiyya71' with your actual Docker Hub username
          tags: fathiyya71/my-express-api:latest